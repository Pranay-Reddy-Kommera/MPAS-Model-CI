name: 'Setup Nsight Systems CLI'
description: |
  Ensure a working `nsys` is available for GPU profiling. If the container image
  does not provide Nsight Systems (or only an NVHPC stub), installs the
  `nsight-systems-cli` RPM set from NVIDIA's devtools repository (RHEL/Alma/Rocky).
  Caches downloaded RPMs under `.cache/nsight-systems-rpms` for faster reruns.

runs:
  using: composite
  steps:
    - id: nsys_ver
      shell: bash
      run: |
        V=1
        if [ -f .github/ci-config.env ]; then
          L=$(grep '^NSYS_CLI_CACHE_VERSION=' .github/ci-config.env | head -1 || true)
          if [ -n "${L}" ]; then
            V="${L#*=}"
            V="${V%%#*}"
            V="${V%%[[:space:]]*}"
          fi
        fi
        echo "version=${V}" >> "${GITHUB_OUTPUT}"
        echo "NSYS_CLI_CACHE_VERSION=${V}" >> "${GITHUB_ENV}"

    - name: Cache nsight-systems-cli RPMs
      id: cache-nsys
      uses: actions/cache@v5
      with:
        path: ${{ github.workspace }}/.cache/nsight-systems-rpms
        # Prefix is what you search for under repo Settings → Actions → Caches (not "nsys build"; we cache .rpm files)
        key: nsight-systems-cli-rpms-v${{ steps.nsys_ver.outputs.version }}-rhel9-${{ runner.arch }}-${{ hashFiles('.github/scripts/install-nsight-systems-cli.sh', '.github/scripts/resolve-nsys.sh') }}

    - name: Install nsight-systems-cli
      shell: bash
      env:
        NSYS_RPM_CACHE_DIR: ${{ github.workspace }}/.cache/nsight-systems-rpms
      run: |
        chmod +x .github/scripts/install-nsight-systems-cli.sh
        bash .github/scripts/install-nsight-systems-cli.sh

    - name: Nsight RPM cache (for Actions cache UI)
      shell: bash
      run: |
        {
          echo "### Nsight Systems CLI — RPM cache"
          echo ""
          echo "This caches **downloaded NVIDIA RPMs** in \`.cache/nsight-systems-rpms/\`, not a standalone \`nsys\` build. After \`dnf install\`, \`nsys\` is on the container filesystem."
          echo ""
          echo "In **Settings → Actions → Caches**, search for keys starting with \`nsight-systems-cli-rpms-\`."
          echo ""
          echo "- **cache-hit** (this run): \`${{ steps.cache-nsys.outputs.cache-hit }}\`"
      } >> "${GITHUB_STEP_SUMMARY}"
        if [ -d .cache/nsight-systems-rpms ]; then
          echo "- **RPM dir size:** \`$(du -sh .cache/nsight-systems-rpms 2>/dev/null || echo unknown)\`" >> "${GITHUB_STEP_SUMMARY}"
        fi
