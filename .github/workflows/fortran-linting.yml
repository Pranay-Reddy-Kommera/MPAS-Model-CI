# Fortran Source Code Linting
# Runs fortitude-lint on MPAS Fortran source to catch style and quality issues.
# Non-blocking (--exit-zero) until the codebase is cleaned up.
#
# Adapted from ESCOMP/CAM-SIMA MPAS dynamical core CI.

name: Fortran Linting

permissions:
  contents: read

on:
  pull_request:
    paths:
      - 'src/**'
      - '.github/linting/**'
      - '.github/workflows/fortran-linting.yml'
  push:
    branches: [master, develop]
    paths:
      - 'src/**'
      - '.github/linting/**'
      - '.github/workflows/fortran-linting.yml'
  workflow_dispatch:

jobs:
  fortitude-lint:
    name: Fortitude Lint
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Fortitude
        run: pip install 'fortitude-lint==0.7.*'

      - name: Run Fortitude
        run: |
          fortitude \
            --config-file .github/linting/fortitude_config.toml \
            check \
            --exit-zero \
            --output-file fortitude-results.log \
            --preview \
            src/

          echo "=== Fortitude Results ==="
          cat fortitude-results.log
          echo ""

          ISSUES=$(grep -c '^\s*[0-9]' fortitude-results.log 2>/dev/null || echo 0)
          echo "Total issues: ${ISSUES}"

      - name: Upload linting results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fortitude-linting-results
          path: fortitude-results.log
          retention-days: 14
          if-no-files-found: ignore
