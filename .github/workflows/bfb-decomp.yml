# Example BFB caller: same I/O build, different MPI rank counts (decomposition).
# Add new scenarios by copying this file and editing `variants` (see `_test-bfb.yml` and `.github/ci-config.env` BFB_*).

name: "BFB: Decomposition (1 vs 4 ranks)"

on:
  workflow_dispatch:
  push:
    branches: [hackathon, 'hackathon/**', 'hackathon-*', hack26, 'hack26/**', feature-ci-bfb]

jobs:
  test:
    uses: ./.github/workflows/_test-bfb.yml
    with:
      compiler: gcc
      mpi: mpich
      variants: >-
        [{"id":"r1","ranks":1,"label":"1 rank"},
         {"id":"r4","ranks":4,"label":"4 ranks"}]
