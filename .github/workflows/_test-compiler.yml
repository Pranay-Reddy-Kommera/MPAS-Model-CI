# Reusable workflow: build and validate MPAS-A for a single compiler+MPI using ECT.
# Called by per-compiler per-MPI subset workflows (e.g. test-gcc-mpich.yml).
#
# Runs ECT with 4 MPI ranks. Validation uses the Ensemble Consistency Test
# (PyCECT) — perturbed runs compared against a pre-built ensemble summary —
# instead of bit-for-bit log comparison.

name: _test-compiler

permissions:
  contents: read
  actions: write

on:
  workflow_call:
    inputs:
      compiler:
        description: 'Compiler family (gcc, nvhpc, oneapi)'
        required: true
        type: string
      mpi:
        description: 'MPI implementation (mpich, openmpi)'
        required: true
        type: string
      mpas-repository:
        description: 'MPAS source repo (e.g. MPAS-Dev/MPAS-Model). Empty = this repo.'
        required: false
        type: string
        default: ''
      mpas-ref:
        description: 'Git ref in the MPAS source repo (branch, tag, SHA)'
        required: false
        type: string
        default: ''

jobs:
  config:
    name: Resolve Config
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.container.outputs.image }}
    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/resolve-container
        id: container
        with:
          compiler: ${{ inputs.compiler }}
          mpi: ${{ inputs.mpi }}

  build:
    needs: config
    name: Build (${{ inputs.compiler }}, ${{ inputs.mpi }}, smiol)
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.config.outputs.image }}

    steps:
      - uses: actions/checkout@v5
        with:
          repository: ${{ inputs.mpas-repository || github.repository }}
          ref: ${{ inputs.mpas-ref || '' }}
          submodules: 'true'
          persist-credentials: false

      - uses: actions/checkout@v5
        if: ${{ inputs.mpas-repository != '' }}
        with:
          path: _ci
          sparse-checkout: .github
          persist-credentials: false

      - name: Overlay CI infrastructure
        if: ${{ inputs.mpas-repository != '' }}
        shell: bash
        run: |
          cp -r _ci/.github . && rm -rf _ci
          echo "## Source: ${{ inputs.mpas-repository }}@${{ inputs.mpas-ref }}" >> "$GITHUB_STEP_SUMMARY"

      - name: Build MPAS-A (double precision)
        uses: ./.github/actions/build-mpas
        with:
          compiler: ${{ inputs.compiler }}
          use-pio: 'false'
          precision: double

      - name: Upload executable
        uses: actions/upload-artifact@v6
        with:
          name: exe-${{ inputs.compiler }}-${{ inputs.mpi }}-smiol
          path: atmosphere_model
          retention-days: 1

  ect-run:
    needs: [config, build]
    if: ${{ needs.build.result == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        member: [0, 1, 2]

    name: ECT member ${{ matrix.member }} (${{ inputs.compiler }}, ${{ inputs.mpi }})
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.config.outputs.image }}

    steps:
      - uses: actions/checkout@v5

      - name: Download executable
        id: download
        uses: actions/download-artifact@v7
        continue-on-error: true
        with:
          name: exe-${{ inputs.compiler }}-${{ inputs.mpi }}-smiol

      - name: Download test case
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/download-testdata
        with:
          test-case: ect-120km
          dest-dir: base-case

      - name: Restore cached restart
        if: steps.download.outcome == 'success'
        id: cache-restart
        uses: actions/cache/restore@v5
        with:
          path: spinup-restart.nc
          key: ect-spinup-restart

      - name: Download spin-up restart
        if: steps.download.outcome == 'success'
        id: restart
        shell: bash
        run: |
          source .github/test-cases/ect-120km/config.env
          RESTART="${ECT_SUMMARY_PREFIX}_restart.nc"

          if [ -f "spinup-restart.nc" ]; then
            echo "Using cached restart file"
            mv spinup-restart.nc "${RESTART}"
            echo "available=true" >> $GITHUB_OUTPUT
            echo "file=${RESTART}" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Downloading ${RESTART} from ${DATA_REPO}..."
          HTTP_CODE=$(curl -sL --retry 5 --retry-delay 5 -w "%{http_code}" \
            "https://github.com/${DATA_REPO}/raw/main/${RESTART}" \
            -o "${RESTART}")
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "Downloaded restart: $(du -h ${RESTART})"
            echo "available=true" >> $GITHUB_OUTPUT
            echo "file=${RESTART}" >> $GITHUB_OUTPUT
          else
            echo "::warning::Spin-up restart not available (HTTP ${HTTP_CODE}), running from cold-start init.nc"
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Run perturbed MPAS-A (member ${{ matrix.member }})
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/run-perturb-mpas
        with:
          base-dir: base-case
          executable: ./atmosphere_model
          member-start: '${{ matrix.member }}'
          member-end: '${{ matrix.member }}'
          num-ranks: '4'
          mpi-impl: ${{ inputs.mpi }}
          restart-file: ${{ steps.restart.outputs.available == 'true' && steps.restart.outputs.file || '' }}

      - name: Upload history file
        uses: actions/upload-artifact@v6
        if: always() && steps.download.outcome == 'success'
        with:
          name: ect-history-${{ inputs.compiler }}-${{ inputs.mpi }}-member${{ matrix.member }}
          path: history-output/history.*.nc
          retention-days: 1

  ect-validate:
    needs: ect-run
    if: ${{ needs.ect-run.result == 'success' }}
    name: ECT Validate (${{ inputs.compiler }}, ${{ inputs.mpi }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          sparse-checkout: .github

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Download history files
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v7
        with:
          pattern: ect-history-${{ inputs.compiler }}-${{ inputs.mpi }}-*
          path: ect-test-files
          merge-multiple: true

      - name: Run ECT validation
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/validate-ect
        with:
          history-dir: ect-test-files
          label: ${{ inputs.compiler }}/${{ inputs.mpi }}/smiol
          dimensions: |
            compiler=${{ inputs.compiler }}
            mpi=${{ inputs.mpi }}
            io=smiol

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: ect-result-${{ inputs.compiler }}-${{ inputs.mpi }}
          path: ect-result.txt
          retention-days: 1

  cleanup:
    needs: [ect-run, ect-validate]
    if: always()
    runs-on: ubuntu-latest
    name: Cleanup

    steps:
      - name: Delete temporary artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh api repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts \
            --paginate --jq '.artifacts[] | select(.name | startswith("exe-") or startswith("ect-history-")) | .id' \
          | while read id; do
              gh api -X DELETE repos/${{ github.repository }}/actions/artifacts/$id || true
            done || true
