# Subset CI: NVHPC + MPICH (CPU)
# Quick ECT validation with 4 MPI ranks.

name: "NVHPC+MPICH (CPU)"

on:
  workflow_dispatch:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]

jobs:
  test:
    uses: ./.github/workflows/_test-compiler.yml
    with:
      compiler: nvhpc
      mpi: mpich
