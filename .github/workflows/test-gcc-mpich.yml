# Subset CI: GNU + MPICH (CPU)
# Quick ECT validation with 4 MPI ranks.

name: "GNU+MPICH (CPU)"

on:
  workflow_dispatch:
  push:
    branches: [master, develop, 'hackathon-*']
  pull_request:
    branches: [master, develop, 'hackathon-*']

jobs:
  test:
    uses: ./.github/workflows/_test-compiler.yml
    with:
      compiler: gcc
      mpi: mpich

