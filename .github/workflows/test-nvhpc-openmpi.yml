# Subset CI: NVHPC + OpenMPI (CPU)
# Quick ECT validation with 4 MPI ranks.
# Known issue: model exits 134 (SIGABRT) on GA runners with 4 ranks.
# MPICH works.

name: "NVHPC+OpenMPI (CPU)"

on:
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/_test-compiler.yml
    with:
      compiler: nvhpc
      mpi: openmpi

