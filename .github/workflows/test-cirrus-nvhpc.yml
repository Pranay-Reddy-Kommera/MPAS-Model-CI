# CIRRUS self-hosted runner workflow
# Builds and runs all NVHPC configurations (CUDA and NoGPU)
# Useful for comparing GPU vs CPU performance and results
#
name: (CIRRUS) NVHPC GPU vs CPU

on:
  workflow_dispatch:
    inputs:
      mpas-repository:
        description: 'MPAS source repo (e.g. MPAS-Dev/MPAS-Model). Leave empty to use this repo.'
        required: false
        default: ''
      mpas-ref:
        description: 'Git ref (branch, tag, or SHA) in the MPAS source repo'
        required: false
        default: ''
    branches:
      - master
      - develop

# Image pattern:
#   nogpu: ncarcisl/cisldev-x86_64-almalinux9-nvhpc-{mpi}:devel
#   cuda:  ncarcisl/cisldev-x86_64-almalinux9-nvhpc-{mpi}-cuda:devel

jobs:
  #===========================================================================
  # BUILD: All NVHPC configurations (CUDA and NoGPU)
  #===========================================================================
  build:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        mpi: [mpich3, mpich, openmpi]
        gpu: [nogpu, cuda]
        io: [smiol, pio]

    name: Build (${{ matrix.mpi }}, ${{ matrix.gpu }}, ${{ matrix.io }})
    runs-on:
      group: CIRRUS-4x8-gpu
    container:
      image: docker.io/ncarcisl/cisldev-x86_64-almalinux9-nvhpc-${{ matrix.mpi }}${{ matrix.gpu == 'cuda' && '-cuda' || '' }}:devel

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.mpas-repository || github.repository }}
          ref: ${{ inputs.mpas-ref || '' }}
          submodules: 'true'

      - uses: actions/checkout@v4
        if: ${{ inputs.mpas-repository != '' }}
        with:
          path: _ci
          sparse-checkout: .github

      - name: Overlay CI infrastructure
        if: ${{ inputs.mpas-repository != '' }}
        shell: bash
        run: cp -r _ci/.github . && rm -rf _ci

      - name: Build MPAS-A
        uses: ./.github/actions/build-mpas
        with:
          compiler: nvhpc
          use-pio: ${{ matrix.io == 'pio' }}
          openacc: ${{ matrix.gpu == 'cuda' }}

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: exe-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}
          path: atmosphere_model
          retention-days: 1

  #===========================================================================
  # RUN: All NVHPC configurations (CUDA and NoGPU)
  #===========================================================================
  run:
    needs: build
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        mpi: [mpich3, mpich, openmpi]
        gpu: [nogpu, cuda]
        io: [smiol, pio]

    name: Run (${{ matrix.mpi }}, ${{ matrix.gpu }}, ${{ matrix.io }})
    runs-on:
      group: CIRRUS-4x8-gpu
    container:
      image: docker.io/ncarcisl/cisldev-x86_64-almalinux9-nvhpc-${{ matrix.mpi }}${{ matrix.gpu == 'cuda' && '-cuda' || '' }}:devel

    steps:
      - uses: actions/checkout@v4

      - name: Check GPU availability
        if: matrix.gpu == 'cuda'
        run: |
          echo "=== GPU Information ==="
          nvidia-smi || echo "WARNING: nvidia-smi failed"

      - name: Download executable
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: exe-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}

      - name: Run MPAS-A
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/run-mpas
        with:
          executable: ./atmosphere_model
          mpi-impl: ${{ matrix.mpi != 'openmpi' && 'mpich' || 'openmpi' }}
          working-dir: run-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}

      - name: Upload logs
        uses: actions/upload-artifact@v4
        if: always() && steps.download.outcome == 'success'
        with:
          name: logs-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}
          path: run-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}/log.*
          retention-days: 5

  #===========================================================================
  # VALIDATE: Compare all logs against reference
  #===========================================================================
  validate:
    needs: run
    if: always()
    runs-on: ubuntu-latest
    name: Validate Results

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download all logs
        id: download-logs
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          pattern: logs-*
          path: logs

      - name: Validate logs
        if: steps.download-logs.outcome == 'success'
        uses: ./.github/actions/validate-logs
        with:
          logs-path: logs
          expected-configs: >-
            logs-nvhpc-mpich3-nogpu-smiol,
            logs-nvhpc-mpich3-nogpu-pio,
            logs-nvhpc-mpich-nogpu-smiol,
            logs-nvhpc-mpich-nogpu-pio,
            logs-nvhpc-openmpi-nogpu-smiol,
            logs-nvhpc-openmpi-nogpu-pio,
            logs-nvhpc-mpich3-cuda-smiol,
            logs-nvhpc-mpich3-cuda-pio,
            logs-nvhpc-mpich-cuda-smiol,
            logs-nvhpc-mpich-cuda-pio,
            logs-nvhpc-openmpi-cuda-smiol,
            logs-nvhpc-openmpi-cuda-pio

      - name: No logs available
        if: steps.download-logs.outcome != 'success'
        run: |
          echo "::warning::No log artifacts available — all runs may have been skipped or failed."

  #===========================================================================
  # BUILD-ECT: Double-precision builds for ECT (O(1e-14) perturbations
  # require double precision to be resolvable in the floating-point format)
  #===========================================================================
  build-ect:
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        mpi: [mpich3, mpich, openmpi]
        gpu: [nogpu, cuda]
        io: [smiol, pio]

    name: Build ECT (${{ matrix.mpi }}, ${{ matrix.gpu }}, ${{ matrix.io }})
    runs-on:
      group: CIRRUS-4x8-gpu
    container:
      image: docker.io/ncarcisl/cisldev-x86_64-almalinux9-nvhpc-${{ matrix.mpi }}${{ matrix.gpu == 'cuda' && '-cuda' || '' }}:devel

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ inputs.mpas-repository || github.repository }}
          ref: ${{ inputs.mpas-ref || '' }}
          submodules: 'true'

      - uses: actions/checkout@v4
        if: ${{ inputs.mpas-repository != '' }}
        with:
          path: _ci
          sparse-checkout: .github

      - name: Overlay CI infrastructure
        if: ${{ inputs.mpas-repository != '' }}
        shell: bash
        run: cp -r _ci/.github . && rm -rf _ci

      - name: Build MPAS-A (double precision)
        uses: ./.github/actions/build-mpas
        with:
          compiler: nvhpc
          use-pio: ${{ matrix.io == 'pio' }}
          openacc: ${{ matrix.gpu == 'cuda' }}
          precision: double

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: exe-ect-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}
          path: atmosphere_model
          retention-days: 1

  #===========================================================================
  # ECT RUN: 3 perturbed ensemble members per matrix combination (120km)
  #===========================================================================
  ect-run:
    needs: build-ect
    if: always() && needs.build-ect.result != 'cancelled'
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        mpi: [mpich3, mpich, openmpi]
        gpu: [nogpu, cuda]
        io: [smiol, pio]

    name: ECT (${{ matrix.mpi }}, ${{ matrix.gpu }}, ${{ matrix.io }})
    runs-on:
      group: CIRRUS-4x8-gpu
    container:
      image: docker.io/ncarcisl/cisldev-x86_64-almalinux9-nvhpc-${{ matrix.mpi }}${{ matrix.gpu == 'cuda' && '-cuda' || '' }}:devel

    steps:
      - uses: actions/checkout@v4

      - name: Check GPU availability
        if: matrix.gpu == 'cuda'
        run: |
          echo "=== GPU Information ==="
          nvidia-smi || echo "WARNING: nvidia-smi failed"

      - name: Download executable
        id: download
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: exe-ect-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}

      - name: Download test case
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/download-testdata
        with:
          test-case: ect-120km
          dest-dir: base-case

      - name: Restore cached restart
        if: steps.download.outcome == 'success'
        id: cache-restart
        uses: actions/cache/restore@v4
        with:
          path: spinup-restart.nc
          key: ect-spinup-restart-${{ github.sha }}
          restore-keys: ect-spinup-restart-

      - name: Download spin-up restart
        if: steps.download.outcome == 'success'
        id: restart
        shell: bash
        run: |
          source .github/test-cases/ect-120km/config.env
          RESTART="${ECT_SUMMARY_PREFIX}_restart.nc"

          if [ -f "spinup-restart.nc" ]; then
            echo "Using cached restart file"
            mv spinup-restart.nc "${RESTART}"
            echo "available=true" >> $GITHUB_OUTPUT
            echo "file=${RESTART}" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Downloading ${RESTART} from ${DATA_REPO}..."
          HTTP_CODE=$(curl -sL --retry 5 --retry-delay 5 -w "%{http_code}" \
            "https://github.com/${DATA_REPO}/raw/main/${RESTART}" \
            -o "${RESTART}")
          if [ "${HTTP_CODE}" = "200" ]; then
            echo "Downloaded restart: $(du -h ${RESTART})"
            echo "available=true" >> $GITHUB_OUTPUT
            echo "file=${RESTART}" >> $GITHUB_OUTPUT
          else
            echo "::warning::Spin-up restart not available (HTTP ${HTTP_CODE}), running from cold-start init.nc"
            echo "available=false" >> $GITHUB_OUTPUT
          fi

      - name: Run perturbed MPAS-A
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/run-perturb-mpas
        with:
          base-dir: base-case
          executable: ./atmosphere_model
          member-start: '0'
          member-end: '2'
          num-ranks: '4'
          mpi-impl: ${{ matrix.mpi != 'openmpi' && 'mpich' || 'openmpi' }}
          restart-file: ${{ steps.restart.outputs.available == 'true' && steps.restart.outputs.file || '' }}

      - name: Upload history files
        uses: actions/upload-artifact@v4
        if: always() && steps.download.outcome == 'success'
        with:
          name: ect-history-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}
          path: history-output/history.*.nc
          retention-days: 1

  #===========================================================================
  # ECT VALIDATE: PyCECT validation per matrix combination
  #===========================================================================
  ect-validate:
    needs: ect-run
    if: always() && needs.ect-run.result != 'cancelled'
    strategy:
      fail-fast: false
      matrix:
        mpi: [mpich3, mpich, openmpi]
        gpu: [nogpu, cuda]
        io: [smiol, pio]

    name: ECT Validate (${{ matrix.mpi }}, ${{ matrix.gpu }}, ${{ matrix.io }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download history files
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: ect-history-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}
          path: ect-test-files

      - name: Run ECT validation
        if: steps.download.outcome == 'success'
        uses: ./.github/actions/validate-ect
        with:
          history-dir: ect-test-files
          label: nvhpc/${{ matrix.mpi }}/${{ matrix.gpu }}/${{ matrix.io }}
          dimensions: |
            mpi=${{ matrix.mpi }}
            gpu=${{ matrix.gpu }}
            io=${{ matrix.io }}

      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ect-result-nvhpc-${{ matrix.mpi }}-${{ matrix.gpu }}-${{ matrix.io }}
          path: ect-result.txt
          retention-days: 1

  #===========================================================================
  # ECT SUMMARY: Consolidated ECT results table
  #===========================================================================
  ect-summary:
    needs: ect-validate
    if: always()
    runs-on: ubuntu-latest
    name: ECT Summary

    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github

      - name: Download all ECT results
        uses: actions/download-artifact@v4
        with:
          pattern: ect-result-*
          path: ect-results

      - name: Generate summary
        uses: ./.github/actions/ect-summary
        with:
          results-path: ect-results

  #===========================================================================
  # CLEANUP: Remove executable artifacts
  #===========================================================================
  cleanup:
    needs: [run, validate, build-ect, ect-run, ect-validate, ect-summary]
    if: always()
    runs-on: ubuntu-latest
    name: Cleanup

    steps:
      - name: Delete executable artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: |
            exe-*
            exe-ect-*
            ect-history-*
          failOnError: false
