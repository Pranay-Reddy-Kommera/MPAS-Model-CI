# Minimal manual workflow on master so `workflow_dispatch` appears in the Actions UI
# and you can confirm repository Actions wiring without running full CI.

name: Stub (manual smoke)

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Stub OK
        run: |
          echo "stub workflow on master OK"
          echo "run_id=${GITHUB_RUN_ID}"
          echo "sha=${GITHUB_SHA}"
